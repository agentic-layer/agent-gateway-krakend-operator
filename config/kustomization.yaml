apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Combines the operator deployment (with namePrefix) and the cluster-scoped
# AgentGatewayClass registration (without namePrefix, so the class keeps a stable,
# conventional name like "krakend" that users reference in AgentGateway resources).
resources:
- ./default
- ./install
